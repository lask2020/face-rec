version: "3.8"

services:
  # 1. Message Broker (IPC)
  redis:
    image: redis:7-alpine
    restart: always

  # 2. Main Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: password
      POSTGRES_DB: facerec
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 3. Frontend Web Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - control-plane
    restart: always

  # 4. Go Control Plane (The Brain)
  control-plane:
    build:
      context: ./go-control-plane
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      - "50051:50051" # gRPC Port
    environment:
      - REDIS_URL=redis:6379
      - POSTGRES_USER=root
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=facerec
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - GO2RTC_URL=http://go2rtc:1984
      - S3_ENDPOINT=rustfs:9000
      - S3_ACCESS_KEY=admin
      - S3_SECRET_KEY=admin12345
      - S3_FACES_BUCKET=faces
      - S3_SNAPSHOTS_BUCKET=snapshots
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - redis
      - postgres
      - go2rtc
      - rustfs
      - qdrant
    restart: always

  # 5. Ingestion Worker Node
  ingestion:
    build:
      context: ./go-ingestion
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis:6379
      - GO2RTC_URL=http://go2rtc:1984
    depends_on:
      - redis
      - go2rtc
    restart: always

  # 6. AI Worker Node (Fleet)
  # ai-worker:
  #   build:
  #     context: ./backend
  #     dockerfile: Dockerfile
  #   environment:
  #     - CONTROL_PLANE_URL=control-plane:50051
  #     # To force a specific ONNX Execution Provider:
  #     # - ONNX_PROVIDER=OpenVINOExecutionProvider   # For Intel GPU/CPU via OpenVINO
  #     # - ONNX_PROVIDER=ROCmExecutionProvider       # For AMD GPU via ROCm (Linux)
  #     # - ONNX_PROVIDER=CUDAExecutionProvider       # For NVIDIA GPU via CUDA
  #   # Passthrough Intel/AMD onboard GPU devices (Linux only):
  #   # devices:
  #   #   - /dev/dri:/dev/dri
  #   depends_on:
  #     - control-plane
  #   restart: always

  # 7. Stream Hub (RTSP/WebRTC/HLS) — replaces mediamtx
  go2rtc:
    image: alexxit/go2rtc:latest
    ports:
      - "1984:1984" # Web UI + REST API
      - "8554:8554" # RTSP
      - "8555:8555" # WebRTC (TCP)
    volumes:
      - ./go2rtc.yaml:/config/go2rtc.yaml
    restart: always

  # 8. Vector Database (Face Embeddings)
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333" # REST API
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: always

  # 9. S3-compatible Object Storage (RustFS)
  rustfs:
    image: rustfs/rustfs:latest
    container_name: rustfs
    ports:
      - "9000:9000" # S3 API
      - "9001:9001" # Console UI
    environment:
      - RUSTFS_ACCESS_KEY=admin
      - RUSTFS_SECRET_KEY=admin12345
      - RUSTFS_VOLUMES=/data
      - RUSTFS_CONSOLE_ENABLE=true
    volumes:
      - rustfs_data:/data
    restart: always

volumes:
  pgdata:
  qdrant_data:
  rustfs_data:
