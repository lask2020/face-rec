server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Single Page Application routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to control-plane
    location /api/ {
        proxy_pass http://control-plane:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Proxy WebSocket connections (if implemented in control-plane)
    location /ws/ {
        proxy_pass http://control-plane:8000/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # Proxy go2rtc REST API (snapshots, WebRTC signaling, stream info)
    location /go2rtc/api/ {
        proxy_pass http://go2rtc:1984/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Required for WebRTC POST signaling (SDP offer/answer)
        proxy_pass_request_body on;
        client_max_body_size 64k;
    }

    # Proxy go2rtc WebSocket for WebRTC signaling
    location /go2rtc/api/ws {
        proxy_pass http://go2rtc:1984/api/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }
}
