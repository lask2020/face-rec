syntax = "proto3";

package facerec;
option go_package = "./facerec";

service FaceInferenceService {
  // Bidirectional stream for both real-time frame processing and face registration
  rpc ProcessStream(stream InferenceResult) returns (stream FrameTask);
}

message FrameTask {
  string task_id = 1;
  bytes image_data = 2;        // JPEG bytes
  bool is_registration = 3;
  string detect_mode = 4;      // "face" | "plate" | "both"  (default: "face")
  bool reload_models = 5;      // signal worker to reload models from disk (no image needed)
  bool start_finetune = 6;     // signal worker to start fine-tuning
  string finetune_dataset_s3_key = 7; // S3 key of exported dataset zip
  int32 finetune_epochs = 8;
  bool stop_finetune = 9;      // signal worker to abort in-progress fine-tuning
  string roboflow_api_key = 10; // API key for auto-downloading Roboflow datasets
}

message InferenceResult {
  string task_id = 1;
  repeated Detection detections = 2;
  string error_message = 3;
  float process_time_ms = 4;
  repeated PlateDetection plate_detections = 5;
  repeated PlateTrainingFrame plate_training_frames = 6;
  FinetuneProgress finetune_progress = 7;
}

message FinetuneProgress {
  string type = 1;    // "epoch" | "done" | "error" | "info"
  int32 epoch = 2;
  int32 epochs = 3;
  float box_loss = 4;
  float cls_loss = 5;
  string message = 6;
  string version = 7;
}

message Detection {
  repeated float bbox = 1;             // [x1, y1, x2, y2]
  repeated float embedding = 2;        // 512-dim embedding
  bytes restored_face_jpeg = 3;        // CodeFormer restored face crop (JPEG)
}

message PlateDetection {
  repeated float bbox = 1;             // [x1, y1, x2, y2]
  string plate_number = 2;             // normalized plate text e.g. "กข 1234"
  float confidence = 3;
  string plate_type = 4;               // "standard" | "commercial" | "unknown"
  string province = 5;                 // Thai province name if detected
  string raw_text = 6;                 // raw OCR text before validation
  string char_labels_json = 7;         // JSON: [{class_name,cx,cy,bw,bh,confidence}]
  bytes snapshot_jpeg = 8;             // deskewed plate crop from best-confidence frame
}

// A single plate crop frame captured for training / active-learning review.
message PlateTrainingFrame {
  bytes crop_jpeg = 1;          // JPEG of deskewed plate crop
  string char_labels_json = 2;  // JSON: [{class_name,cx,cy,bw,bh,confidence}]
  float confidence = 3;
  string raw_text = 4;
  string track_id = 5;          // stable UUID for the PlateTrack that generated this frame
}
