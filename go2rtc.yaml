# go2rtc configuration for Docker deployment
# Ref: https://github.com/AlexxIT/go2rtc/wiki/Configuration

webrtc:
  # Listen for WebRTC media on TCP port 8555 (exposed in docker-compose)
  listen: ":8555/tcp"
  # Auto-discover external IP via STUN and advertise port 8555
  candidates:
    - stun:8555

api:
  listen: ":1984"

rtsp:
  listen: ":8554"
